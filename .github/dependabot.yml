version: 2

updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"      # 05:00 UTC = 09:00 UTC+4 (Tbilisi)
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    groups:
      github-actions-updates:
        patterns:
          - "*"

  # ── npm templates ───────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/bootstrap-templates/express-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Tbilisi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    groups:
      express-backend-npm-updates:
        patterns:
          - "*"

