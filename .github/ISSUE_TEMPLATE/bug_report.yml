name: Bug Report
description: Something isn't working as expected in a rule, hook, template, or the /setup command.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as you can — it helps us reproduce and fix issues faster.

  - type: input
    id: claude-version
    attributes:
      label: Claude Code version
      description: Run `claude --version` and paste the output.
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Ubuntu / Debian
        - Other Linux
        - Windows (Git Bash)
        - Windows (WSL2)
    validations:
      required: true

  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - bash
        - zsh
        - fish
        - PowerShell
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages or unexpected output.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, step-by-step sequence to reproduce the issue.
      placeholder: |
        1. Run `./install.sh`
        2. Open a project and type ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: affected
    attributes:
      label: Affected rule / hook / template (optional)
      description: e.g. `rules/01-auto-checkpoint.md`, `hooks/settings-hooks.json`, `bootstrap-templates/nextjs-webapp`
      placeholder: "rules/NN-name.md"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant (screenshots, related issues, etc.)
    validations:
      required: false
