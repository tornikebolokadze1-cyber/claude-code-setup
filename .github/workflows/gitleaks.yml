name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  # Run weekly on Monday at 06:00 UTC to catch secrets added to history
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for scheduled/history scans)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # fetch-depth: 0 ensures gitleaks can scan the full git history,
          # not just the tip commit. Required for scheduled runs.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          # GITLEAKS_LICENSE is only required for private organisational repos.
          # For public personal repos this env var can be absent — gitleaks-action
          # will still run successfully without it.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # The action reads .gitleaks.toml from the repo root automatically.
        # Our .gitleaks.toml adds an allowlist for .env.example / placeholder values.
