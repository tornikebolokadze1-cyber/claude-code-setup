name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["main"]

# Least-privilege token scope (security.md §1.2). Actions that need more
# should declare their own permissions block.
permissions:
  contents: read

jobs:
  lint-and-check:
    name: Lint & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # gitleaks needs full history to diff parent..tip on PRs; shallow
          # clone causes "unknown revision" on the first commit of a branch.
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --- Shell lint ---
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck install.sh and scripts/
        run: |
          shellcheck install.sh
          shellcheck scripts/*.sh

      # --- Markdown lint (non-blocking: warnings surfaced, build passes) ---
      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Markdownlint rules/ commands/ archive/
        run: |
          markdownlint-cli2 "rules/**/*.md" "commands/**/*.md" "archive/**/*.md" || true

      # --- Install.sh smoke test (runs installer against scratch HOME) ---
      - name: Smoke-test install.sh against scratch HOME
        run: |
          SCRATCH=$(mktemp -d)
          export HOME="$SCRATCH"
          echo "Running ./install.sh with HOME=$HOME"
          ./install.sh
          echo ""
          echo "=== Post-install directory check ==="
          ls -la "$HOME/.claude/" || { echo "FAIL: ~/.claude/ not created"; exit 1; }
          test -d "$HOME/.claude/rules" || { echo "FAIL: rules/ not installed"; exit 1; }
          test -d "$HOME/.claude/commands" || { echo "FAIL: commands/ not installed"; exit 1; }
          test -d "$HOME/.claude/scripts" || { echo "FAIL: scripts/ not installed"; exit 1; }
          test -d "$HOME/.claude/hooks" || { echo "FAIL: hooks/ not installed"; exit 1; }
          test -d "$HOME/.claude/templates" || { echo "FAIL: templates/ not installed"; exit 1; }
          test -d "$HOME/.claude/archive/bootstrap-templates" || { echo "FAIL: archive/bootstrap-templates/ not installed"; exit 1; }
          test -f "$HOME/.claude/commands/setup-AI-Pulse-Georgia.md" || { echo "FAIL: setup command missing"; exit 1; }
          test -f "$HOME/.claude/hooks/settings-hooks.json" || { echo "FAIL: baseline hooks config missing"; exit 1; }
          test -f "$HOME/.claude/templates/CLAUDE.md.example" || { echo "FAIL: CLAUDE.md.example missing"; exit 1; }
          RULE_COUNT=$(find "$HOME/.claude/rules" -maxdepth 1 -name '*.md' -type f | wc -l)
          test "$RULE_COUNT" -ge 15 || { echo "FAIL: only $RULE_COUNT rules (need ≥15)"; exit 1; }
          echo "All post-install checks passed (rules=$RULE_COUNT)."

      - name: Run validate-install.sh against scratch install
        run: |
          chmod +x "$HOME/.claude/scripts/validate-install.sh" 2>/dev/null || \
            chmod +x scripts/validate-install.sh
          ./scripts/validate-install.sh || echo "validate-install reported warnings (non-fatal)"
        env:
          CLAUDE_HOME: ${{ env.HOME }}

      # --- Secret scan ---
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- No large files ---
      - name: Check for large files (>1MB)
        run: |
          LARGE=$(find . -not -path './.git/*' -size +1M)
          if [ -n "$LARGE" ]; then
            echo "ERROR: Large files found:"
            echo "$LARGE"
            exit 1
          fi
          echo "No large files found."

      # --- Local sync verifier (optional, only when VERIFY_REF is set) ---
      - name: Verify local sync (optional)
        if: ${{ env.VERIFY_REF != '' }}
        run: |
          chmod +x scripts/verify-local-sync.sh
          ./scripts/verify-local-sync.sh .
        env:
          VERIFY_REF: ${{ vars.VERIFY_REF }}
