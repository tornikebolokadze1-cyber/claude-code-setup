# Gitleaks custom rules — April 2026
# Extends default gitleaks v8 rules with patterns specific to this repo's
# target stacks (Telegram, n8n, Supabase, Anthropic, OpenAI).
#
# Keeps the `default` base ruleset; adds new rule entries only.

title = "claude-code-setup gitleaks config"

# Extend default gitleaks rules (DO NOT set `useDefault = false`; we want
# the baseline ~150 rules plus these additions).

[[rules]]
id = "telegram-bot-token"
description = "Telegram Bot API token"
regex = '''(?i)(?:telegram|bot)[^\s]*[:=]\s*["']?([0-9]{8,12}:[A-Za-z0-9_-]{35,})["']?'''
tags = ["telegram", "token"]

[[rules]]
id = "telegram-bot-token-env"
description = "Telegram Bot API token assigned directly to env var"
regex = '''TELEGRAM_BOT_TOKEN\s*[:=]\s*["']?([0-9]{8,12}:[A-Za-z0-9_-]{35,})["']?'''
tags = ["telegram", "token", "env"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic Claude API key (sk-ant-...)"
regex = '''sk-ant-(?:api|admin)[0-9]{2}-[A-Za-z0-9_-]{80,}'''
tags = ["anthropic", "api-key"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-(?:proj-)?[A-Za-z0-9_-]{20,}T3BlbkFJ[A-Za-z0-9_-]{20,}'''
tags = ["openai", "api-key"]

[[rules]]
id = "n8n-api-key"
description = "n8n API key (api_n8n_...)"
regex = '''(?i)n8n[_-]?api[_-]?(?:key|token)\s*[:=]\s*["']?([A-Za-z0-9._-]{32,})["']?'''
tags = ["n8n", "api-key"]

[[rules]]
id = "supabase-service-role-jwt"
description = "Supabase service_role JWT (role == service_role in JWT payload)"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[A-Za-z0-9_-]{40,}\.[A-Za-z0-9_-]{40,}'''
tags = ["supabase", "jwt"]

[[rules]]
id = "cloudflare-api-token"
description = "Cloudflare API token (v1.0-...)"
regex = '''v1\.0-[A-Za-z0-9]{40,}-[A-Za-z0-9]{40,}'''
tags = ["cloudflare", "api-token"]

[[rules]]
id = "firecrawl-api-key"
description = "Firecrawl API key (fc-...)"
regex = '''fc-[A-Za-z0-9]{32,}'''
tags = ["firecrawl", "api-key"]

# Allowlist for .env.example and docs
[allowlist]
paths = [
    '''\.env\.example$''',
    '''\.env\.template$''',
    '''\.envrc\.template\.''',
    '''archive/.*/\.env\.example$''',
    '''templates/.*\.example$''',
    '''SECURITY\.md$''',
    '''\.gitleaks\.toml$''',
]
regexes = [
    '''REPLACE-ME''',
    '''your-.*-here''',
    '''placeholder''',
    '''example-value''',
]
